<kt-portlet>
    <kt-portlet-header [sticky]="true" [title]="'La liste des OFs Extrusion'" [class]="'card-head-lg'">
        <ng-container ktPortletTools>
           
        </ng-container>
    </kt-portlet-header>
    <kt-portlet-body>
        <div class="example-preview">
            <form class="form" [formGroup]="woForm">
                <div class="row col-6">
                </div>   
                <div class="row" style="display: flex; justify-content:center">
                    <div class="form-group col-3">
                       
                        <div class="input-group input-group-sm">
                            <input class="form-control form-control-sm form-control-solid"  formControlName="date" 
                                 placeholder="jj-mm-aaaa" name="date" ngbDatepicker f
                                #date="ngbDatepicker"   >
                            <div class="input-group-append">
                                <button class="btn btn-primary" (click)="date.toggle()"  type="button">
                                    <i class="flaticon-calendar-with-a-clock-time-tools"></i>
                                </button>
                            </div>
                            
                        </div>

                    </div>
                    <div class="form-group col-3">
                       
                        <div class="input-group input-group-sm">
                            <input class="form-control form-control-sm form-control-solid"  formControlName="date1" 
                                 placeholder="jj-mm-aaaa" name="date1" ngbDatepicker f
                                #date1="ngbDatepicker"   >
                            <div class="input-group-append">
                                <button class="btn btn-primary" (click)="date1.toggle()"  type="button">
                                    <i class="flaticon-calendar-with-a-clock-time-tools"></i>
                                </button>
                            </div>
                            
                        </div>

                    </div>
               
                    <div class="form-group col-4">
                  
                        <div class="input-group input-group-sm">

                        <button type="button"  (click)="wolist()" class="btn btn-sm btn-primary btn-elevate col-lg-4">Valider </button>
                        </div>
                    </div>  
                </div>
            </form>
            <div class="row">
                <angular-slickgrid class="col-12" gridHeight="300" gridId="gridprograms" [columnDefinitions]="columnDefinitions1"
                    [gridOptions]="gridOptions1" [dataset]="dataset1"
                    (onAngularGridCreated)="angularGridReady1($event)"
                            (sgOnSelectedRowsChanged)="handleSelectedRowsChanged1($event.detail.eventData, $event.detail.args)"
                            >
                </angular-slickgrid>
            </div>
            
        </div>
        <div class="example-preview"></div>
        <div class="example-preview">
            <div class="row">
                <angular-slickgrid class="col-12"  gridId="gridDevise" [columnDefinitions]="columnDefinitions"
                (onAngularGridCreated)="angularGridReady($event)"
                    [gridOptions]="gridOptions" [dataset]="dataset">
                </angular-slickgrid>
            </div>
            
        </div>

    </kt-portlet-body>
</kt-portlet>
